<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">
    <div class="container">
        <div class="left-content" data-purpose="custom-background-target"></div>
        <div class="right-content">
            <div class="title">Welcome back!</div>
            <div class="subtitle">...or welcome, perhaps?</div>
            <form action="#" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="form-group">
                    <label class="label" for="username">Username</label>
                    <input class="input" id="username" placeholder="username@gmail.com" type="text"/>
                </div>
                <div class="form-group">
                    <label class="label" for="password">Password</label>
                    <input class="input" id="password" placeholder="************" type="password"/>
                    <div class="forgot-password"><a href="#">Forgot password?</a></div>
                </div>
                <button class="login-btn" type="submit">Login</button>
                <div class="footer-text">Don't have an account? <a href="#">Sign Up instead</a></div>
            </form>
        </div>
    </div>
</body>

</html>
